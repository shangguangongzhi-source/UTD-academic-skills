name: literature-radar
version: 2.0.0
description: >
  经管领域顶刊文献精准检索与分级筛选。SKILL.md 使用本清单决定为一次
  文献检索请求加载哪些片段。主轴是 workflow：用户需求映射到多个工作流之一。

always_load:
  - static/core/journal-tiers.md
  - static/core/search-rules.md

axes:
  workflow:
    detect: |
      将用户需求映射到一个工作流。组合请求（如检索后导出）可同时加载多个。
        topic-search       — 按研究主题检索顶刊文献
        author-tracking    — 按作者/团队追踪顶刊发表记录
        citation-trace     — 引文网络追踪（前向/后向引文）
        journal-scan       — 扫描特定期刊的最新发表论文
    values:
      topic-search:       references/workflows/wf1-topic-search.md
      author-tracking:    references/workflows/wf2-author-tracking.md
      citation-trace:     references/workflows/wf3-citation-trace.md
      journal-scan:       references/workflows/wf4-journal-scan.md
    multi: true

references:
  on_demand:
    - condition: 去重（WF 1, 2, 3 共用）
      path: references/dedup-engine.md
    - condition: 关键词扩展与多轮检索策略
      path: references/search-strategy.md
    - condition: HTML 报告渲染脚本
      path: scripts/render_report.py